<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğaya 💙</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Poppins',sans-serif;
min-height:100vh;
background:linear-gradient(135deg,#0a0f2c,#111a4d,#1b2a7a);
overflow-x:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}
.flash{
position:fixed;
width:100%;height:100%;
background:white;
opacity:0;
pointer-events:none;
z-index:5;
transition:opacity 0.3s;
}
.stars{position:fixed;width:100%;height:100%;overflow:hidden;z-index:0;}
.star{
position:absolute;
width:2px;height:2px;
background:white;
border-radius:50%;
opacity:0.7;
animation:twinkle 3s infinite alternate;
}
@keyframes twinkle{from{opacity:0.2;}to{opacity:1;}}
.container{
z-index:2;
max-width:600px;
padding:30px 20px;
animation:fadeIn 3s ease forwards;
opacity:0;
}
@keyframes fadeIn{to{opacity:1;}}
h1{
font-family:'Great Vibes',cursive;
font-size:55px;
color:#7da2ff;
text-shadow:0 0 20px rgba(125,162,255,0.8),0 0 40px rgba(125,162,255,0.4);
transition:0.5s;
}
.pulse{animation:pulse 1.5s infinite;}
@keyframes pulse{
0%{transform:scale(1);text-shadow:0 0 20px rgba(125,162,255,0.8);}
50%{transform:scale(1.08);text-shadow:0 0 40px rgba(125,162,255,1),0 0 80px rgba(125,162,255,0.6);}
100%{transform:scale(1);text-shadow:0 0 20px rgba(125,162,255,0.8);}
}
.date{
font-size:14px;
opacity:0.6;
margin:10px 0 25px 0;
letter-spacing:3px;
}
.message-text{
font-weight:300;
line-height:1.8;
font-size:16px;
margin-bottom:30px;
opacity:0.9;
}
.btn{
padding:14px 35px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#3f5efb,#5f8bff);
color:white;
font-size:16px;
font-family:'Poppins',sans-serif;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 25px rgba(125,162,255,0.5);
}
.btn:hover{
transform:scale(1.05);
box-shadow:0 0 40px rgba(125,162,255,0.8);
}
.hidden-message{
margin-top:30px;
font-size:17px;
line-height:1.8;
opacity:0;
transition:opacity 1.5s ease;
}
.show{opacity:1;}
.heart{
position:fixed;
color:#7da2ff;
z-index:3;
animation:floatHeart 5s linear forwards;
pointer-events:none;
}
@keyframes floatHeart{
0%{transform:translateY(100vh) scale(1);opacity:1;}
50%{opacity:1;}
100%{transform:translateY(-10vh) scale(1.5);opacity:0;}
}
.shooting-star{
position:fixed;
width:80px;height:2px;
background:linear-gradient(to right,transparent,white);
z-index:1;
animation:shoot 1.5s linear forwards;
pointer-events:none;
}
@keyframes shoot{
0%{transform:translateX(0) translateY(0);opacity:1;}
100%{transform:translateX(300px) translateY(200px);opacity:0;}
}
</style>
</head>
<body>
<div class="flash" id="flash"></div>
<div class="stars" id="stars"></div>
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b7b7e.mp3?filename=romantic-love-11786.mp3" type="audio/mpeg">
</audio>
<div class="container">
<h1 id="name">Doğaya ✨</h1>
<div class="date">02 / 07 / 2026 💙</div>
<p class="message-text">
Milyonlarca Dilek Hakkım Olsa Ben Yine Seni Seçerdim<br>
Birini Bu kadar Sevmek Mümkünmü Bilmem Ama Senin Mutluluğun İçin Ömrümü Bile Verebilirim<br>
</p>
<button class="btn" onclick="startLove()">Kalbime Dokun 💙</button>
<div id="message" class="hidden-message">
Sen benim en güzel başlangıcımsın.<br>
 . 💙
</div>
</div>
<script>
var starsDiv=document.getElementById("stars");
for(var i=0;i<150;i++){
var star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
star.style.animationDuration=(Math.random()*3+2)+"s";
star.style.animationDelay=Math.random()*3+"s";
starsDiv.appendChild(star);
}
function createHeart(){
var heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💙";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*25+15)+"px";
document.body.appendChild(heart);
setTimeout(function(){heart.remove();},5000);
}
function createShootingStar(){
var s=document.createElement("div");
s.className="shooting-star";
s.style.top=Math.random()*50+"vh";
s.style.left=Math.random()*50+"vw";
document.body.appendChild(s);
setTimeout(function(){s.remove();},1500);
}
function flashEffect(){
var flash=document.getElementById("flash");
flash.style.opacity="0.7";
setTimeout(function(){flash.style.opacity="0";},300);
}
function startLove(){
document.getElementById("music").play();
document.getElementById("message").classList.add("show");
document.getElementById("name").classList.add("pulse");
flashEffect();
for(var i=0;i<50;i++){
setTimeout(createHeart,i*100);
}
for(var j=0;j<5;j++){
setTimeout(createShootingStar,j*300);
}
setInterval(function(){
createHeart();
},2000);
setInterval(function(){
createShootingStar();
},4000);
}
</script>
</body>
</html>
