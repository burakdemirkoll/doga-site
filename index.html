<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğa</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TCZV2Q01WK"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-TCZV2Q01WK');
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Poppins',sans-serif;
background:#0a0f2c;
color:white;
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:rgba(0,0,0,0.3);
z-index:100;
}
nav a{
color:#7da2ff;
text-decoration:none;
font-size:14px;
}

/* MAIN */
.main{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding-top:60px;
}

h1{
font-family:'Great Vibes',cursive;
font-size:60px;
color:#7da2ff;
margin-bottom:20px;
}

.btn{
padding:12px 30px;
border:none;
border-radius:25px;
background:#1f4fff;
color:white;
cursor:pointer;
margin-top:20px;
}

/* HEART */
.heart{
position:fixed;
bottom:-20px;
animation:heartUp 4s linear forwards;
pointer-events:none;
}
@keyframes heartUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

/* BUTTERFLY */
.butterfly{
position:fixed;
font-size:22px;
animation:flyButterfly 10s linear forwards;
pointer-events:none;
}
@keyframes flyButterfly{
0%{transform:translateX(-10vw) translateY(80vh);}
100%{transform:translateX(110vw) translateY(-60vh);}
}

/* MEMORY */
.memory{
display:grid;
grid-template-columns:repeat(5,60px);
gap:10px;
margin-top:40px;
}
.card{
width:60px;
height:60px;
background:#1f4fff;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
border-radius:10px;
cursor:pointer;
}

/* SLOT */
.slot{
display:flex;
gap:10px;
font-size:35px;
margin-top:30px;
}
.reel{
width:60px;
height:60px;
background:#111a4d;
display:flex;
justify-content:center;
align-items:center;
border-radius:10px;
}

#admin{
display:none;
position:fixed;
bottom:10px;
left:10px;
background:#111a4d;
padding:10px;
border-radius:10px;
font-size:12px;
}
</style>
</head>

<body>

<nav>
<a href="#">Ana Sayfa</a>
<a href="#">Hafıza</a>
<a href="#">Slot</a>
<a href="#">Zaman</a>
</nav>

<div class="main">
<h1>Doğa</h1>
<p>02/07/2026'dan beri hayat daha net.<br>Daha sakin.<br>Daha anlamlı.</p>
<button class="btn" onclick="megaEffect()">Başlat</button>

<!-- MEMORY -->
<div class="memory" id="memoryGame"></div>

<!-- SLOT -->
<div class="slot">
<div class="reel" id="r1">❔</div>
<div class="reel" id="r2">❔</div>
<div class="reel" id="r3">❔</div>
</div>
<button class="btn" onclick="spin()">Çevir</button>
<p id="slotResult"></p>

<!-- TIME -->
<p id="timeText" style="margin-top:30px;"></p>

</div>

<div id="admin">
Admin Panel<br>
Ziyaret: <span id="visitCount">0</span>
</div>

<script>

/* ✅ BAŞLAT EFEKT */
function megaEffect(){
for(let i=0;i<70;i++){
setTimeout(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💙";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*25+15)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),4000);
},i*50);
}

for(let i=0;i<20;i++){
setTimeout(()=>{
let b=document.createElement("div");
b.className="butterfly";
b.innerHTML="🦋";
b.style.top=Math.random()*80+"vh";
b.style.animationDuration=(Math.random()*5+6)+"s";
document.body.appendChild(b);
setTimeout(()=>b.remove(),10000);
},i*200);
}
}

/* ✅ MEMORY */
var symbols=["💙","🦋","✨","⭐","🌙"];
var cards=[...symbols,...symbols];
cards.sort(()=>0.5-Math.random());
var first=null;
cards.forEach(sym=>{
var c=document.createElement("div");
c.className="card";
c.innerText="?";
c.onclick=function(){
if(c.innerText!=="?")return;
c.innerText=sym;
if(!first){first=c;}
else{
if(first.innerText!==c.innerText){
setTimeout(()=>{
c.innerText="?";
first.innerText="?";
first=null;
},600);
}else{
first=null;
}
}
};
document.getElementById("memoryGame").appendChild(c);
});

/* ✅ SLOT */
var icons=["💙","🦋","✨","⭐","🌙"];
function spin(){
var r1=document.getElementById("r1");
var r2=document.getElementById("r2");
var r3=document.getElementById("r3");
r1.innerText=icons[Math.floor(Math.random()*icons.length)];
r2.innerText=icons[Math.floor(Math.random()*icons.length)];
r3.innerText=icons[Math.floor(Math.random()*icons.length)];
if(r1.innerText===r2.innerText&&r2.innerText===r3.innerText){
document.getElementById("slotResult").innerText="Kazandın 💙";
}else{
document.getElementById("slotResult").innerText="Tekrar dene.";
}
}

/* ✅ TIME */
function updateTime(){
var start=new Date("2026-07-02T00:00:00");
var now=new Date();
var diff=now-start;
document.getElementById("timeText").innerText=
Math.floor(diff/86400000)+" gün geçti.";
}
setInterval(updateTime,1000);
updateTime();

/* ✅ ADMIN */
let count=0;
document.addEventListener("keydown",e=>{
if(e.key==="a"){
count++;
if(count===5){
document.getElementById("admin").style.display="block";
}
}
});

</script>

</body>
</html>
