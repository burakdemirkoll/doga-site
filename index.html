<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğa</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}
body{
font-family:'Poppins',sans-serif;
background:#0a0f2c;
color:white;
overflow-x:hidden;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:#0a0f2c;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:500;
}
#intro h1{
font-family:'Great Vibes',cursive;
font-size:48px;
color:#7da2ff;
margin-bottom:30px;
line-height:1.4;
}
#intro button{
padding:12px 30px;
border:none;
border-radius:25px;
background:#1f4fff;
color:white;
cursor:pointer;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:rgba(0,0,0,0.4);
z-index:100;
}
nav a{
color:#7da2ff;
text-decoration:none;
font-size:14px;
}

/* SECTIONS */
.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:100px 20px 40px;
}

h1{
font-family:'Great Vibes',cursive;
font-size:60px;
color:#7da2ff;
margin-bottom:20px;
}

.btn{
padding:12px 30px;
border:none;
border-radius:25px;
background:#1f4fff;
color:white;
cursor:pointer;
margin-top:20px;
}

/* HEART */
.heart{
position:fixed;
bottom:-20px;
animation:heartUp 4s linear forwards;
pointer-events:none;
}
@keyframes heartUp{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);opacity:0;}
}

/* BUTTERFLY */
.butterfly{
position:fixed;
font-size:22px;
animation:fly 10s linear forwards;
pointer-events:none;
}
@keyframes fly{
0%{transform:translateX(-10vw) translateY(80vh);}
100%{transform:translateX(110vw) translateY(-60vh);}
}

/* MEMORY */
.memory{
display:grid;
grid-template-columns:repeat(5,65px);
gap:10px;
margin-top:30px;
}
.card{
width:65px;height:65px;
background:#1f4fff;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
border-radius:10px;
cursor:pointer;
}

/* SLOT */
.slot{
display:flex;
gap:15px;
font-size:40px;
margin:20px 0;
}
.reel{
width:70px;height:70px;
background:#111a4d;
display:flex;
justify-content:center;
align-items:center;
border-radius:10px;
}

.time-box{
margin-top:20px;
font-size:18px;
line-height:1.8;
}
</style>
</head>

<body>

<!-- ✅ INTRO -->
<div id="intro">
<h1>Milyonlarca dilek hakkım olsaydı,<br>ben yine seni dilerdim.</h1>
<button onclick="enterSite()">Giriş</button>
</div>

<!-- ✅ NAV -->
<nav>
<a href="#home">Ana Sayfa</a>
<a href="#memory">Hafıza</a>
<a href="#slot">Slot</a>
<a href="#time">Zaman</a>
</nav>

<!-- ✅ HOME -->
<section id="home" class="section">
<h1>Doğa</h1>
<p>02/07/2026'dan beri hayat daha net.<br>Daha sakin.<br>Daha anlamlı.</p>
<button class="btn" onclick="megaEffect()">Başlat</button>
</section>

<!-- ✅ MEMORY -->
<section id="memory" class="section">
<h1>Hafıza</h1>
<div class="memory" id="memoryGame"></div>
</section>

<!-- ✅ SLOT -->
<section id="slot" class="section">
<h1>Slot</h1>
<div class="slot">
<div class="reel" id="r1">❔</div>
<div class="reel" id="r2">❔</div>
<div class="reel" id="r3">❔</div>
</div>
<button class="btn" onclick="spin()">Çevir</button>
<p id="slotResult"></p>
</section>

<!-- ✅ TIME -->
<section id="time" class="section">
<h1>Zaman</h1>
<div class="time-box" id="timeBox"></div>
</section>

<script>

/* INTRO */
function enterSite(){
document.getElementById("intro").style.display="none";
}

/* EFFECT */
function megaEffect(){
for(let i=0;i<80;i++){
setTimeout(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💙";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*25+15)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),4000);
},i*40);
}
for(let i=0;i<25;i++){
setTimeout(()=>{
let b=document.createElement("div");
b.className="butterfly";
b.innerHTML="🦋";
b.style.top=Math.random()*80+"vh";
document.body.appendChild(b);
setTimeout(()=>b.remove(),10000);
},i*200);
}
}

/* MEMORY */
let symbols=["💙","🦋","✨","⭐","🌙"];
let cards=[...symbols,...symbols].sort(()=>0.5-Math.random());
let first=null;
cards.forEach(sym=>{
let c=document.createElement("div");
c.className="card";
c.innerText="?";
c.onclick=function(){
if(c.innerText!=="?")return;
c.innerText=sym;
if(!first){first=c;}
else{
if(first.innerText!==c.innerText){
setTimeout(()=>{
c.innerText="?";
first.innerText="?";
first=null;
},600);
}else{
first=null;
}
}
};
document.getElementById("memoryGame").appendChild(c);
});

/* SLOT */
let icons=["💙","🦋","✨","⭐","🌙"];
function spin(){
r1.innerText=icons[Math.floor(Math.random()*icons.length)];
r2.innerText=icons[Math.floor(Math.random()*icons.length)];
r3.innerText=icons[Math.floor(Math.random()*icons.length)];
if(r1.innerText===r2.innerText&&r2.innerText===r3.innerText){
document.getElementById("slotResult").innerText="Kazandın 💙";
megaEffect();
}else{
document.getElementById("slotResult").innerText="Tekrar dene.";
}
}

/* ✅ GELİŞMİŞ ZAMAN HESABI */
function updateTime(){
let start=new Date("2026-07-02T00:00:00");
let now=new Date();

let diff=now-start;
if(diff<0)diff=0;

let seconds=Math.floor(diff/1000);
let minutes=Math.floor(seconds/60);
let hours=Math.floor(minutes/60);
let days=Math.floor(hours/24);

let years=Math.floor(days/365);
days%=365;

let months=Math.floor(days/30);
days%=30;

let weeks=Math.floor(days/7);
days%=7;

hours%=24;
minutes%=60;
seconds%=60;

document.getElementById("timeBox").innerHTML=
years+" yıl<br>"+
months+" ay<br>"+
weeks+" hafta<br>"+
days+" gün<br>"+
hours+" saat<br>"+
minutes+" dakika<br>"+
seconds+" saniye";
}

setInterval(updateTime,1000);
updateTime();

</script>

</body>
</html>
