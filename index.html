<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğa</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- GOOGLE ANALYTICS -->

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-TCZV2Q01WK');

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0a0f2c,#111a4d,#1b2a7a);
color:white;
overflow-x:hidden;
transition:0.5s;
}
.light{
background:linear-gradient(135deg,#eef2f3,#ffffff);
color:#1b2a7a;
}
#intro{
position:fixed;
width:100%;
height:100%;
background:#0a0f2c;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:500;
}
#intro h1{
font-family:'Great Vibes',cursive;
font-size:45px;
color:#7da2ff;
margin-bottom:20px;
}
.btn{
padding:10px 20px;
border:none;
border-radius:20px;
background:#3f5efb;
color:white;
cursor:pointer;
margin:5px;
}
.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}
h1{
font-family:'Great Vibes',cursive;
font-size:50px;
color:#7da2ff;
margin-bottom:20px;
}
.mode{
position:fixed;
bottom:20px;
right:20px;
}

/* HEART */
.heart{
position:fixed;
top:100vh;
color:#7da2ff;
animation:heartFloat 4s linear forwards;
pointer-events:none;
z-index:400;
}
@keyframes heartFloat{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);opacity:0;}
}

/* BUTTERFLY */
.butterfly{
position:fixed;
top:80vh;
left:-10vw;
font-size:22px;
animation:butterflyFly 12s linear forwards;
pointer-events:none;
}
@keyframes butterflyFly{
0%{transform:translate(0,0);}
100%{transform:translate(120vw,-80vh);}
}

/* MEMORY */
.memory{
display:grid;
grid-template-columns:repeat(5,60px);
gap:10px;
}
.card{
width:60px;
height:60px;
background:#3f5efb;
display:flex;
justify-content:center;
align-items:center;
font-size:25px;
border-radius:10px;
cursor:pointer;
}

/* SLOT */
.slot{
display:flex;
gap:10px;
font-size:40px;
margin:15px 0;
}
.reel{
width:60px;
height:60px;
background:#111a4d;
display:flex;
justify-content:center;
align-items:center;
border-radius:10px;
}

#adminPanel{
display:none;
position:fixed;
bottom:10px;
left:10px;
background:#111a4d;
padding:10px;
border-radius:10px;
font-size:12px;
}
</style>
</head>

<body>

<div id="intro">
<h1>Milyonlarca dilek hakkım olsaydı,<br>ben yine seni dilerdim.</h1>
<button class="btn" onclick="enterSite()">Giriş</button>
</div>

<button class="btn mode" onclick="toggleMode()">🌙 / ☀️</button>

<div class="section">
<h1>Doğa</h1>
<button class="btn" onclick="startEffect()">Başlat</button>

<h2>Hafıza Oyunu</h2>
<div class="memory" id="memoryGame"></div>
<p>Hamle: <span id="moves">0</span></p>

<h2>Slot</h2>
<div class="slot">
<div class="reel" id="r1">❔</div>
<div class="reel" id="r2">❔</div>
<div class="reel" id="r3">❔</div>
</div>
<button class="btn" onclick="spin()">Çevir</button>
<p id="slotResult"></p>

<h2>Geçen Süre</h2>
<p id="timeText"></p>

</div>

<div id="adminPanel">
Admin Panel<br>
Ziyaret: <span id="visitCount">0</span>
</div>

<script>

/* INTRO */
function enterSite(){
document.getElementById("intro").style.display="none";
}

/* MODE */
function toggleMode(){
document.body.classList.toggle("light");
}

/* HEART */
function createHeart(){
var h=document.createElement("div");
h.className="heart";
h.innerHTML="💙";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
}

/* BUTTERFLY */
function createButterfly(){
var b=document.createElement("div");
b.className="butterfly";
b.innerHTML="🦋";
document.body.appendChild(b);
setTimeout(()=>b.remove(),12000);
}
setInterval(createButterfly,6000);

/* START */
function startEffect(){
for(let i=0;i<25;i++)setTimeout(createHeart,i*60);
}

/* MEMORY */
var symbols=["💙","🦋","✨","⭐","🌙"];
var cards=[...symbols,...symbols];
cards.sort(()=>0.5-Math.random());
var first=null,moves=0;
cards.forEach(sym=>{
var c=document.createElement("div");
c.className="card";
c.innerText="?";
c.onclick=function(){
if(c.innerText!=="?")return;
c.innerText=sym;
if(!first){first=c;}
else{
moves++;
document.getElementById("moves").innerText=moves;
if(first.innerText!==c.innerText){
setTimeout(()=>{
c.innerText="?";
first.innerText="?";
first=null;
},700);
}else{
first=null;
}
}
};
document.getElementById("memoryGame").appendChild(c);
});

/* SLOT */
var icons=["💙","🦋","✨","⭐","🌙"];
function spin(){
var r1=document.getElementById("r1");
var r2=document.getElementById("r2");
var r3=document.getElementById("r3");
r1.innerText=icons[Math.floor(Math.random()*icons.length)];
r2.innerText=icons[Math.floor(Math.random()*icons.length)];
r3.innerText=icons[Math.floor(Math.random()*icons.length)];
if(r1.innerText===r2.innerText&&r2.innerText===r3.innerText){
document.getElementById("slotResult").innerText="Kazandın 💙";
}else{
document.getElementById("slotResult").innerText="Tekrar dene.";
}
}

/* TIME */
function updateTime(){
var start=new Date("2026-07-02T00:00:00");
var now=new Date();
var diff=now-start;
document.getElementById("timeText").innerText=
Math.floor(diff/86400000)+" gün";
}
setInterval(updateTime,1000);
updateTime();

/* ADMIN */
let count=0;
document.addEventListener("keydown",e=>{
if(e.key==="a"){
count++;
if(count===5){
document.getElementById("adminPanel").style.display="block";
}
}
});

</script>

</body>
</html>
