<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğa</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0a0f2c,#111a4d,#1b2a7a);
color:white;
overflow-x:hidden;
transition:background 0.6s,color 0.6s;
}

/* LIGHT MODE */
.light{
background:linear-gradient(135deg,#eef2f3,#ffffff);
color:#1b2a7a;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:#0a0f2c;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:500;
padding:20px;
animation:fadeIn 2s ease;
}
#intro h1{
font-family:'Great Vibes',cursive;
font-size:48px;
color:#7da2ff;
line-height:1.4;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
background:rgba(10,15,44,0.85);
display:flex;
justify-content:center;
gap:10px;
padding:10px;
z-index:200;
backdrop-filter:blur(10px);
}
nav a{
color:#7da2ff;
text-decoration:none;
font-size:13px;
padding:6px 12px;
border-radius:15px;
transition:0.3s;
}
nav a:hover{background:rgba(125,162,255,0.2);}

/* SECTIONS */
.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:90px 20px 40px;
text-align:center;
opacity:0;
transform:translateY(40px);
transition:1s;
}
.section.visible{
opacity:1;
transform:translateY(0);
}

h1{
font-family:'Great Vibes',cursive;
font-size:55px;
color:#7da2ff;
margin-bottom:20px;
}

h2{
font-family:'Great Vibes',cursive;
font-size:40px;
color:#7da2ff;
margin-bottom:20px;
}

p{max-width:500px;line-height:1.8;margin-bottom:20px;}

.btn{
padding:12px 25px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#3f5efb,#5f8bff);
color:white;
cursor:pointer;
margin:5px;
transition:0.3s;
}
.btn:hover{transform:scale(1.05);}

/* HEART */
.heart{
position:fixed;
color:#7da2ff;
animation:float 4s linear forwards;
pointer-events:none;
}
@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);opacity:0;}
}

/* BUTTERFLY */
.butterfly{
position:fixed;
font-size:20px;
animation:fly 12s linear forwards;
pointer-events:none;
}
@keyframes fly{
0%{transform:translateX(-10vw) translateY(80vh);}
100%{transform:translateX(110vw) translateY(-10vh);}
}

/* MEMORY */
.memory{
display:grid;
grid-template-columns:repeat(5,70px);
gap:10px;
justify-content:center;
}
.card{
width:70px;
height:70px;
background:#7da2ff;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
border-radius:10px;
cursor:pointer;
}
.stats{margin-top:15px;font-size:14px;}

/* SLOT */
.slot-machine{
display:flex;
gap:10px;
font-size:40px;
margin:20px 0;
}
.reel{
width:70px;
height:70px;
background:#111a4d;
display:flex;
justify-content:center;
align-items:center;
border-radius:10px;
}

/* COUNTDOWN */
.count{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}
.count div{
background:rgba(125,162,255,0.2);
padding:10px 15px;
border-radius:10px;
}

.mode{
position:fixed;
bottom:20px;
right:20px;
}
</style>
</head>

<body>

<div id="intro">
<h1>Milyonlarca dilek hakkım olsaydı,<br>ben yine seni dilerdim.</h1>
<button class="btn" onclick="enter()">Giriş</button>
</div>

<nav>
<a href="#home">Ana Sayfa</a>
<a href="#memory">Hafıza</a>
<a href="#slot">Slot</a>
<a href="#time">Zaman</a>
</nav>

<button class="btn mode" onclick="toggleMode()">🌙 / ☀️</button>

<!-- HOME -->
<div class="section" id="home">
<h1>Doğa</h1>
<p>
02/07/2026'dan beri hayat daha net.<br>
Daha sakin.<br>
Daha anlamlı.
</p>
<button class="btn" onclick="start()">Başlat</button>
</div>

<!-- MEMORY -->
<div class="section" id="memory">
<h2>Hafıza Oyunu</h2>
<div class="memory" id="memoryGame"></div>
<div class="stats">
Hamle: <span id="moves">0</span> |
Süre: <span id="timer">0</span>s |
Skor: <span id="score">0</span>
</div>
<button class="btn" onclick="resetGame()">Yeniden Başlat</button>
</div>

<!-- SLOT -->
<div class="section" id="slot">
<h2>Slot</h2>
<div class="slot-machine">
<div class="reel" id="r1">❔</div>
<div class="reel" id="r2">❔</div>
<div class="reel" id="r3">❔</div>
</div>
<button class="btn" onclick="spin()">Çevir</button>
<p id="slotResult"></p>
</div>

<!-- TIME -->
<div class="section" id="time">
<h2>02 / 07 / 2026</h2>
<div class="count">
<div><span id="d">0</span> Gün</div>
<div><span id="h">0</span> Saat</div>
<div><span id="m">0</span> Dakika</div>
<div><span id="s">0</span> Saniye</div>
</div>
</div>

<script>

/* INTRO */
function enter(){document.getElementById("intro").style.display="none";}

/* MODE */
function toggleMode(){document.body.classList.toggle("light");}

/* SCROLL ANIMATION */
function reveal(){
document.querySelectorAll(".section").forEach(sec=>{
if(sec.getBoundingClientRect().top < window.innerHeight-100){
sec.classList.add("visible");
}
});
}
window.addEventListener("scroll",reveal);
reveal();

/* HEART EFFECT */
function heart(){
var h=document.createElement("div");
h.className="heart";
h.innerHTML="💙";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
}

/* START EFFECT */
function start(){
for(let i=0;i<30;i++)setTimeout(heart,i*60);
}

/* BUTTERFLY LOOP */
setInterval(()=>{
var b=document.createElement("div");
b.className="butterfly";
b.innerHTML="🦋";
b.style.fontSize=(Math.random()*15+15)+"px";
document.body.appendChild(b);
setTimeout(()=>b.remove(),12000);
},5000);

/* MEMORY GAME */
var symbols=["💙","🦋","✨","🌙","⭐","🎵","🌊","🔥","🌌","🌿"];
var cards=[];
var first=null,lock=false,moves=0,matched=0,time=0,timerInterval;

function initGame(){
cards=[...symbols,...symbols].sort(()=>0.5-Math.random());
document.getElementById("memoryGame").innerHTML="";
first=null;lock=false;moves=0;matched=0;time=0;
document.getElementById("moves").innerText=0;
document.getElementById("score").innerText=0;
clearInterval(timerInterval);
timerInterval=setInterval(()=>{time++;document.getElementById("timer").innerText=time;},1000);

cards.forEach(sym=>{
let c=document.createElement("div");
c.className="card";
c.innerText="?";
c.onclick=function(){
if(lock||c.innerText!=="?")return;
c.innerText=sym;
if(!first){first=c;}
else{
moves++;
document.getElementById("moves").innerText=moves;
if(first.innerText===c.innerText){
matched++;
document.getElementById("score").innerText=matched*10;
first=null;
if(matched===10){
clearInterval(timerInterval);
for(let i=0;i<40;i++)setTimeout(heart,i*50);
}
}else{
lock=true;
setTimeout(()=>{
c.innerText="?";
first.innerText="?";
first=null;
lock=false;
},700);
}
}
};
document.getElementById("memoryGame").appendChild(c);
});
}

function resetGame(){initGame();}
initGame();

/* SLOT MACHINE */
var icons=["💙","🦋","✨","⭐","🌙"];

function spinReel(reel,delay){
let spins=20;
let interval=setInterval(()=>{
reel.innerText=icons[Math.floor(Math.random()*icons.length)];
spins--;
if(spins<=0){
clearInterval(interval);
}
},delay);
}

function spin(){
let r1=document.getElementById("r1");
let r2=document.getElementById("r2");
let r3=document.getElementById("r3");

spinReel(r1,80);
setTimeout(()=>spinReel(r2,100),200);
setTimeout(()=>spinReel(r3,120),400);

setTimeout(()=>{
if(r1.innerText===r2.innerText && r2.innerText===r3.innerText){
document.getElementById("slotResult").innerText="Kazandın.";
for(let i=0;i<25;i++)setTimeout(heart,i*70);
}else{
document.getElementById("slotResult").innerText="Tekrar dene.";
}
},2500);
}

/* COUNTDOWN */
function update(){
let start=new Date("2026-07-02T00:00:00");
let now=new Date();
let diff=now-start;
document.getElementById("d").innerText=Math.floor(diff/86400000);
document.getElementById("h").innerText=Math.floor(diff%86400000/3600000);
document.getElementById("m").innerText=Math.floor(diff%3600000/60000);
document.getElementById("s").innerText=Math.floor(diff%60000/1000);
}
setInterval(update,1000);
update();

</script>

</body>
</html>
