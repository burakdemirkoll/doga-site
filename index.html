<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğa</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-TCZV2Q01WK');

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0a0f2c,#111a4d,#1b2a7a);
color:white;
overflow-x:hidden;
transition:0.5s;
}

.light{
background:linear-gradient(135deg,#eef2f3,#ffffff);
color:#1b2a7a;
}

#intro{
position:fixed;
width:100%;
height:100%;
background:#0a0f2c;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:500;
}

#intro h1{
font-family:'Great Vibes',cursive;
font-size:45px;
color:#7da2ff;
margin-bottom:20px;
}

.btn{
padding:12px 25px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#3f5efb,#5f8bff);
color:white;
cursor:pointer;
margin:5px;
transition:0.3s;
}

.btn:hover{transform:scale(1.05);}

.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

h1{
font-family:'Great Vibes',cursive;
font-size:55px;
color:#7da2ff;
margin-bottom:20px;
}

.mode{
position:fixed;
bottom:20px;
right:20px;
z-index:300;
}

/* ✅ KALP */
.heart{
position:fixed;
top:100vh;
color:#7da2ff;
animation:heartFloat 4s linear forwards;
pointer-events:none;
z-index:400;
}

@keyframes heartFloat{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* ✅ KELEBEK */
.butterfly{
position:fixed;
top:80vh;
left:-10vw;
font-size:22px;
animation:butterflyFly 12s linear forwards;
pointer-events:none;
z-index:350;
}

@keyframes butterflyFly{
0%{transform:translate(0,0);}
25%{transform:translate(30vw,-10vh);}
50%{transform:translate(60vw,-25vh);}
75%{transform:translate(90vw,-45vh);}
100%{transform:translate(120vw,-70vh);}
}
</style>
</head>

<body>

<div id="intro">
<h1>Milyonlarca dilek hakkım olsaydı,<br>ben yine seni dilerdim.</h1>
<button class="btn" onclick="enterSite()">Giriş</button>
</div>

<button class="btn mode" onclick="toggleMode()">🌙 / ☀️</button>

<div class="section">
<h1>Doğa</h1>
<p>02/07/2026'dan beri hayat daha net.</p>
<button class="btn" onclick="startEffect()">Başlat</button>
</div>

<script>

/* ✅ GİRİŞ */
function enterSite(){
document.getElementById("intro").style.display="none";
}

/* ✅ GECE GÜNDÜZ */
function toggleMode(){
document.body.classList.toggle("light");
}

/* ✅ KALP EFEKTİ */
function createHeart(){
var heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💙";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";
document.body.appendChild(heart);
setTimeout(function(){heart.remove();},4000);
}

/* ✅ KELEBEK EFEKTİ */
function createButterfly(){
var b=document.createElement("div");
b.className="butterfly";
b.innerHTML="🦋";
b.style.fontSize=(Math.random()*15+18)+"px";
b.style.animationDuration=(Math.random()*6+8)+"s";
document.body.appendChild(b);
setTimeout(function(){b.remove();},12000);
}

/* ✅ BAŞLAT */
function startEffect(){
for(var i=0;i<30;i++){
setTimeout(createHeart,i*60);
}
for(var j=0;j<5;j++){
setTimeout(createButterfly,j*500);
}
}

/* ✅ OTOMATİK KELEBEK */
setInterval(createButterfly,6000);

</script>

</body>
</html>
