<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğa</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TCZV2Q01WK"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-TCZV2Q01WK');
function trackEvent(name,data={}){
if(typeof gtag==="function"){gtag("event",name,data);}
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}
body{
font-family:'Poppins',sans-serif;
background:#0a0f2c;
color:white;
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:rgba(0,0,0,0.4);
z-index:100;
backdrop-filter:blur(10px);
}
nav a{
color:#7da2ff;
text-decoration:none;
font-size:14px;
}
nav a.active{color:white}

/* SECTIONS */
.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:100px 20px 40px;
opacity:0;
transform:translateY(40px);
transition:0.8s;
}
.section.visible{
opacity:1;
transform:translateY(0);
}

h1{
font-family:'Great Vibes',cursive;
font-size:60px;
color:#7da2ff;
margin-bottom:20px;
}

.btn{
padding:12px 30px;
border:none;
border-radius:25px;
background:#1f4fff;
color:white;
cursor:pointer;
margin-top:20px;
transition:0.3s;
}
.btn:hover{transform:scale(1.05)}

/* HEART PARTICLE */
.heart{
position:fixed;
bottom:-20px;
animation:heartUp 4s linear forwards;
pointer-events:none;
z-index:999;
}
@keyframes heartUp{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-120vh) scale(1.5);opacity:0;}
}

/* BUTTERFLY */
.butterfly{
position:fixed;
font-size:22px;
animation:fly 10s linear forwards;
pointer-events:none;
z-index:998;
}
@keyframes fly{
0%{transform:translateX(-10vw) translateY(80vh);}
100%{transform:translateX(110vw) translateY(-60vh);}
}

/* MEMORY */
.memory{
display:grid;
grid-template-columns:repeat(5,65px);
gap:10px;
margin-top:30px;
}
.card{
width:65px;height:65px;
background:#1f4fff;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
border-radius:10px;
cursor:pointer;
}

/* SLOT */
.slot{
display:flex;
gap:15px;
font-size:40px;
margin:20px 0;
}
.reel{
width:70px;height:70px;
background:#111a4d;
display:flex;
justify-content:center;
align-items:center;
border-radius:10px;
font-size:30px;
}

/* ADMIN */
#admin{
display:none;
position:fixed;
bottom:10px;
left:10px;
background:#111a4d;
padding:12px;
border-radius:10px;
font-size:12px;
}
</style>
</head>

<body>

<nav>
<a href="#home">Ana Sayfa</a>
<a href="#memory">Hafıza</a>
<a href="#slot">Slot</a>
<a href="#time">Zaman</a>
</nav>

<!-- HOME -->
<section id="home" class="section">
<h1>Doğa</h1>
<p>02/07/2026'dan beri hayat daha net.<br>Daha sakin.<br>Daha anlamlı.</p>
<button class="btn" onclick="megaEffect()">Başlat</button>
</section>

<!-- MEMORY -->
<section id="memory" class="section">
<h1>Hafıza</h1>
<div>Hamle: <span id="moves">0</span> | Süre: <span id="memTime">0</span>s</div>
<div class="memory" id="memoryGame"></div>
</section>

<!-- SLOT -->
<section id="slot" class="section">
<h1>Slot</h1>
<div class="slot">
<div class="reel" id="r1">❔</div>
<div class="reel" id="r2">❔</div>
<div class="reel" id="r3">❔</div>
</div>
<button class="btn" onclick="spin()">Çevir</button>
<p id="slotResult"></p>
</section>

<!-- TIME -->
<section id="time" class="section">
<h1>Zaman</h1>
<p id="timeText"></p>
</section>

<div id="admin">
Admin Panel<br>
Ziyaret: <span id="visitCount"></span>
</div>

<script>

/* SECTION FADE */
function reveal(){
document.querySelectorAll(".section").forEach(sec=>{
if(sec.getBoundingClientRect().top<window.innerHeight-100){
sec.classList.add("visible");
}
});
}
window.addEventListener("scroll",reveal);
reveal();

/* ACTIVE NAV */
window.addEventListener("scroll",()=>{
document.querySelectorAll("section").forEach(sec=>{
if(window.scrollY>=sec.offsetTop-200){
document.querySelectorAll("nav a").forEach(a=>a.classList.remove("active"));
let id=sec.getAttribute("id");
let link=document.querySelector(`nav a[href="#${id}"]`);
if(link)link.classList.add("active");
}
});
});

/* MEGA EFFECT */
function megaEffect(){
trackEvent("start_clicked");
for(let i=0;i<80;i++){
setTimeout(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💙";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*25+15)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),4000);
},i*40);
}
for(let i=0;i<25;i++){
setTimeout(()=>{
let b=document.createElement("div");
b.className="butterfly";
b.innerHTML="🦋";
b.style.top=Math.random()*80+"vh";
document.body.appendChild(b);
setTimeout(()=>b.remove(),10000);
},i*200);
}
}

/* MEMORY GAME */
let symbols=["💙","🦋","✨","⭐","🌙","🌌","🔥","🌊","🌿","🎵"];
let cards=[...symbols,...symbols].sort(()=>0.5-Math.random());
let first=null,lock=false,moves=0,memTimer=0,interval;

function initMemory(){
document.getElementById("memoryGame").innerHTML="";
moves=0;
memTimer=0;
document.getElementById("moves").innerText=0;
document.getElementById("memTime").innerText=0;
clearInterval(interval);
interval=setInterval(()=>{memTimer++;document.getElementById("memTime").innerText=memTimer},1000);

cards.forEach(sym=>{
let c=document.createElement("div");
c.className="card";
c.innerText="?";
c.onclick=function(){
if(lock||c.innerText!=="?")return;
c.innerText=sym;
if(!first){first=c;}
else{
moves++;
document.getElementById("moves").innerText=moves;
if(first.innerText!==c.innerText){
lock=true;
setTimeout(()=>{
c.innerText="?";
first.innerText="?";
first=null;
lock=false;
},700);
}else{
first=null;
}
}
};
document.getElementById("memoryGame").appendChild(c);
});
}
initMemory();

/* SLOT */
let icons=["💙","🦋","✨","⭐","🌙"];
function spin(){
trackEvent("slot_spin");
let reels=[r1,r2,r3];
reels.forEach(r=>{
let count=15;
let spinInt=setInterval(()=>{
r.innerText=icons[Math.floor(Math.random()*icons.length)];
count--;
if(count<=0)clearInterval(spinInt);
},100);
});
setTimeout(()=>{
if(r1.innerText===r2.innerText&&r2.innerText===r3.innerText){
document.getElementById("slotResult").innerText="Kazandın 💙";
trackEvent("slot_win");
megaEffect();
}else{
document.getElementById("slotResult").innerText="Tekrar dene.";
}
},1700);
}

/* TIME */
function updateTime(){
let start=new Date("2026-07-02T00:00:00");
let now=new Date();
let diff=now-start;
document.getElementById("timeText").innerText=Math.floor(diff/86400000)+" gün geçti.";
}
setInterval(updateTime,1000);
updateTime();

/* VISIT COUNT */
let visits=localStorage.getItem("visits")||0;
visits++;
localStorage.setItem("visits",visits);
document.getElementById("visitCount").innerText=visits;

/* ADMIN (Shift+D 3 kez) */
let combo=0;
document.addEventListener("keydown",e=>{
if(e.shiftKey && e.key==="D"){
combo++;
if(combo>=3){
document.getElementById("admin").style.display="block";
}
}
});

/* UTM */
let params=new URLSearchParams(window.location.search);
let source=params.get("source");
if(source){trackEvent("visit_source",{source});}

</script>

</body>
</html>
