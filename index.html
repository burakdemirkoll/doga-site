<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğa</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{
font-family:'Poppins',sans-serif;
background:#0a0f2c;
color:white;
overflow-x:hidden;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:#0a0f2c;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:500;
transition:opacity 0.8s ease;
}
#intro h1{
font-family:'Great Vibes',cursive;
font-size:46px;
color:#7da2ff;
margin-bottom:25px;
}
#intro button{
padding:12px 28px;
border:none;
border-radius:25px;
background:#1f4fff;
color:white;
cursor:pointer;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:40px;
padding:18px;
background:rgba(10,15,44,0.6);
backdrop-filter:blur(12px);
z-index:100;
}

nav a{
font-family:'Poppins',sans-serif;
font-weight:500;
font-size:15px;
letter-spacing:0.5px;
color:#9fb4ff;
text-decoration:none;
position:relative;
transition:0.3s;
padding-bottom:4px;
}

/* hover çizgi animasyonu */
nav a::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:0%;
height:2px;
background:#7da2ff;
transition:0.3s;
}

nav a:hover{
color:#ffffff;
}

nav a:hover::after{
width:100%;
}
/* SECTIONS */
.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:100px 20px 40px;
}

h1{
font-family:'Great Vibes',cursive;
font-size:58px;
color:#7da2ff;
margin-bottom:20px;
}

.btn{
padding:12px 30px;
border:none;
border-radius:25px;
background:#1f4fff;
color:white;
cursor:pointer;
margin-top:20px;
}

/* HEART */
.heart{
position:fixed;
bottom:-20px;
pointer-events:none;
animation:heartUp 4s linear forwards;
}
@keyframes heartUp{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);opacity:0;}
}

/* BUTTERFLY */
.butterfly{
position:fixed;
pointer-events:none;
animation:fly 10s linear forwards;
}
@keyframes fly{
0%{transform:translateX(-10vw) translateY(80vh);}
100%{transform:translateX(110vw) translateY(-60vh);}
}

/* MEMORY */
.memory{
display:grid;
grid-template-columns:repeat(5,65px);
gap:10px;
margin-top:30px;
}
.card{
width:65px;height:65px;
background:#1f4fff;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
border-radius:10px;
cursor:pointer;
}

/* SLOT */
.slot{
display:flex;
gap:15px;
font-size:38px;
margin:20px 0;
}
.reel{
width:70px;height:70px;
background:#111a4d;
display:flex;
justify-content:center;
align-items:center;
border-radius:10px;
}
</style>
</head>

<body>

<!-- ✅ INTRO -->
<div id="intro">
<h1>Milyonlarca dilek hakkım olsaydı,<br>ben yine seni dilerdim.</h1>
<button onclick="enterSite()">Giriş</button>
</div>

<nav>
<a href="#home">Ana Sayfa</a>
<a href="#memory">Hafıza</a>
<a href="#slot">Slot</a>
<a href="#time">Zaman</a>
</nav>

<section id="home" class="section">
<h1>Doğa</h1>
<p>02/07/2026'dan beri hayat daha net.<br>Daha sakin.<br>Daha anlamlı.</p>
<button class="btn" onclick="megaEffect()">Başlat</button>
</section>

<section id="memory" class="section">
<h1>Hafıza</h1>
<div class="memory" id="memoryGame"></div>
</section>

<section id="slot" class="section">
<h1>Slot</h1>
<div class="slot">
<div class="reel" id="r1">❔</div>
<div class="reel" id="r2">❔</div>
<div class="reel" id="r3">❔</div>
</div>
<button class="btn" onclick="spin()">Çevir</button>
<p id="slotResult"></p>
</section>

<section id="time" class="section">
<h1>Zaman</h1>
<div id="timeBox"></div>
</section>

<script>

/* ✅ GİRİŞ FADE */
function enterSite(){
const intro=document.getElementById("intro");
intro.style.opacity="0";
setTimeout(()=>{intro.style.display="none";},800);
}

/* ✅ KALP + KELEBEK */
function megaEffect(){
for(let i=0;i<70;i++){
setTimeout(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💙";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*25+15)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),4000);
},i*40);
}
for(let i=0;i<25;i++){
setTimeout(()=>{
let b=document.createElement("div");
b.className="butterfly";
b.innerHTML="🦋";
b.style.top=Math.random()*80+"vh";
b.style.fontSize=(Math.random()*20+15)+"px";
document.body.appendChild(b);
setTimeout(()=>b.remove(),10000);
},i*200);
}
}

/* ✅ MEMORY */
const symbols=["💙","🦋","✨","⭐","🌙"];
const cards=[...symbols,...symbols].sort(()=>0.5-Math.random());
let first=null;

cards.forEach(sym=>{
let c=document.createElement("div");
c.className="card";
c.textContent="?";
c.addEventListener("click",function(){
if(c.textContent!=="?")return;
c.textContent=sym;
if(!first){first=c;}
else{
if(first.textContent!==c.textContent){
setTimeout(()=>{
c.textContent="?";
first.textContent="?";
first=null;
},600);
}else{
first=null;
}
}
});
document.getElementById("memoryGame").appendChild(c);
});

/* ✅ SLOT (iOS SAFE) */
function spin(){
const icons=["💙","🦋","✨","⭐","🌙"];
const reels=[
document.getElementById("r1"),
document.getElementById("r2"),
document.getElementById("r3")
];
reels.forEach(r=>{
r.textContent=icons[Math.floor(Math.random()*icons.length)];
});
if(reels[0].textContent===reels[1].textContent &&
reels[1].textContent===reels[2].textContent){
document.getElementById("slotResult").textContent="Kazandın 💙";
megaEffect();
}else{
document.getElementById("slotResult").textContent="Tekrar dene.";
}
}

/* ✅ GERÇEK TAKVİM ZAMAN HESABI */
function updateTime(){
const start=new Date(2026,6,2);
const now=new Date();

let years=now.getFullYear()-start.getFullYear();
let months=now.getMonth()-start.getMonth();
let days=now.getDate()-start.getDate();

if(days<0){
months--;
const prevMonth=new Date(now.getFullYear(),now.getMonth(),0);
days+=prevMonth.getDate();
}
if(months<0){
years--;
months+=12;
}

const diff=now-start;
const hours=Math.floor(diff/3600000)%24;
const minutes=Math.floor(diff/60000)%60;
const seconds=Math.floor(diff/1000)%60;

document.getElementById("timeBox").innerHTML=
years+" yıl<br>"+
months+" ay<br>"+
days+" gün<br>"+
hours+" saat<br>"+
minutes+" dakika<br>"+
seconds+" saniye";
}

setInterval(updateTime,1000);
updateTime();

</script>

</body>
</html>
